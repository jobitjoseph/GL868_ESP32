sentence=GPS tracking library for ESP32-S3 with SIM868 modem and WS2812B LED
paragraph=A comprehensive GPS tracking library featuring non-blocking operation, deep sleep power management, SMS/Call control with LED indicators, configurable operating modes, motion detection via LIS3DHTR, WS2812B RGB status LED, on-demand GPS, custom HTTP POST, and offline data queuing. Designed for battery-powered GPS tracking applications.
